  /* ===== Main Container ===== */
  .main-wrapper {
    flex: 1;
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
    padding: var(--spacing-md);
  }

  /* ===== Responsive ===== */
  @media (max-width: 768px) {

<!-- ===== Main Content Area ===== -->
<main class="main-wrapper">
  
<sectionclass="card">
  <h2>历史记录</h2>
  <div style="display:flex; gap:var(--spacing-sm); flex-wrap:wrap; margin-bottom:var(--spacing-md);">
    <a href="index.html" class="btn btn-outline">返回首页</a>
    <a href="settings.html" class="btn btn-outline">前往设置</a>
    <button id="clearAllBtn" class="btn btn-outline">清空全部</button>
  </div>
  <div id="historyList" style="margin-top:var(--spacing-md);"></div>
</section>

<script>
  // 从 localStorage 读取历史记录，格式：[{id:String, data:String, time:String}]
  function loadRecords() {
    const raw = localStorage.getItem('history');
    return raw ? JSON.parse(raw) : [];
  }
  function saveRecords(records) {
    localStorage.setItem('history', JSON.stringify(records));
  }
  function renderRecords() {
    const container = document.getElementById('historyList');
    const records = loadRecords();
    container.innerHTML = '';
    if (records.length === 0) {
      container.innerHTML = '<p style="color:var(--text-secondary);">暂无历史记录</p>';
      return;
    }
    // 按时间倒序显示
    records.slice().sort((a,b)=>new Date(b.time)-new Date(a.time)).forEach(rec=>{
      const item = document.createElement('div');
      item.style.display = 'flex';
      item.style.justifyContent = 'space-between';
      item.style.alignItems = 'center';
      item.style.padding = 'var(--spacing-sm) 0';
      item.style.borderBottom = '1px solid var(--border)';
      item.dataset.id = rec.id;

      const info = document.createElement('div');
      const contentDiv = document.createElement('div');
      contentDiv.textContent = rec.data;
      contentDiv.style.fontSize = '.9rem';
      contentDiv.style.color = 'var(--text)';
      const timeDiv = document.createElement('div');
      timeDiv.textContent = new Date(rec.time).toLocaleString();
      timeDiv.style.fontSize = '.75rem';
      timeDiv.style.color = 'var(--text-secondary)';
      info.appendChild(contentDiv);
      info.appendChild(timeDiv);

      const actions = document.createElement('div');
      actions.style.display = 'flex';
      actions.style.gap = 'var(--spacing-sm)';
      const viewBtn = document.createElement('button');
      viewBtn.textContent = '查看';
      viewBtn.className = 'btn btn-outline';
      viewBtn.dataset.action = 'view';
      const editBtn = document.createElement('button');
      editBtn.textContent = '编辑';
      editBtn.className = 'btn btn-outline';
      editBtn.dataset.action = 'edit';
      const delBtn = document.createElement('button');
      delBtn.textContent = '删除';
      delBtn.className = 'btn btn-outline';
      delBtn.dataset.action = 'delete';
      const dlBtn = document.createElement('button');
      dlBtn.textContent = '下载';
      dlBtn.className = 'btn btn-outline';
      dlBtn.dataset.action = 'download';
      actions.append(viewBtn, editBtn, delBtn, dlBtn);

      item.append(info, actions);
      container.appendChild(item);
    });

    // 事件委托
    container.addEventListener('click', e=>{
      const btn = e.target.closest('button');
      if (!btn) return;
      const action = btn.dataset.action;
      const id = btn.parentElement.parentElement.dataset.id;
      const records = loadRecords();
      const rec = records.find(r=>r.id===id);
      if (!rec) return;
      switch(action){
        case 'view':
          alert(rec.data);
          break;
        case 'edit':
          // 带参数跳转到首页，假设首页能读取 ?data=
          location.href = 'index.html?data='+encodeURIComponent(rec.data);
          break;
        case 'delete':
          if (confirm('确定删除此条记录？')){
            const updated = records.filter(r=>r.id!==id);
            saveRecords(updated);
            renderRecords();
          }
          break;
        case 'download':
          const blob = new Blob([rec.data], {type:'text/plain'});
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `record_${id}.txt`;
          a.click();
          URL.revokeObjectURL(url);
          break;
      }
    });
  }
  document.getElementById('clearAllBtn').addEventListener('click',()=>{
    if (confirm('确定清空所有历史记录？')){
      localStorage.removeItem('history');
      renderRecords();
    }
  });
  // 初始渲染
  renderRecords();
</script>
