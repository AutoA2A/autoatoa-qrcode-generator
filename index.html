<!-- ===== Main Content Area ===== -->
<main class="main-wrapper">
  
<div class="main-wrapper">
  <section class="card">
    <h2>生成二维码</h2>
    <div class="input-group">
      <label for="qr-content">内容</label>
      <input type="text" id="qr-content" placeholder="输入文本、URL、邮箱、电话等">
    </div>
    <div class="controls">
      <div class="control-row">
        <label>尺寸: <span id="size-value">256</span>px</label>
        <input type="range" id="size-slider" min="128" max="512" step="8" value="256">
      </div>
      <div class="control-row">
        <label>前景色: <input type="color" id="fg-color" value="#000000"></label>
      </div>
      <div class="control-row">
        <label>背景色: <input type="color" id="bg-color" value="#ffffff"></label>
      </div>
      <div class="control-row">
        <label>容错率:
          <select id="error-level">
            <option value="L">L (7%)</option>
            <option value="M" selected>M (15%)</option>
            <option value="Q">Q (25%)</option>
            <option value="H">H (30%)</option>
          </select>
        </label>
      </div>
    </div>
    <div class="preview">
      <canvas id="qr-canvas" width="256" height="256"></canvas>
    </div>
    <div class="actions">
      <button class="btn btn-primary" id="download-png">下载 PNG</button>
      <button class="btn btn-outline" id="download-svg">下载 SVG</button>
    </div>
  </section>
  <script src="./qrcode.js"></script>
  <script>
    const canvas = document.getElementById('qr-canvas');
    const ctx = canvas.getContext('2d');

    function makeQR() {
      const text = document.getElementById('qr-content').value.trim();
      if (!text) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        return;
      }
      const size = parseInt(document.getElementById('size-slider').value);
      const dark = document.getElementById('fg-color').value;
      const light = document.getElementById('bg-color').value;
      const level = document.getElementById('error-level').value;
      canvas.width = size;
      canvas.height = size;
      new QRCode(canvas, {
        text: text,
        width: size,
        height: size,
        colorDark: dark,
        colorLight: light,
        correctLevel: QRCode.CorrectLevel[level]
      });
    }

    // 输入实时更新
    document.getElementById('qr-content').addEventListener('input', makeQR);
    document.getElementById('size-slider').addEventListener('input', function () {
      document.getElementById('size-value').textContent = this.value;
      makeQR();
    });
    document.getElementById('fg-color').addEventListener('input', makeQR);
    document.getElementById('bg-color').addEventListener('input', makeQR);
    document.getElementById('error-level').addEventListener('change', makeQR);

    // 下载 PNG
    document.getElementById('download-png').addEventListener('click', () => {
      const link = document.createElement('a');
      link.href = canvas.toDataURL('image/png');
      link.download = 'qrcode.png';
      link.click();
    });

    // 下载 SVG（将当前 Canvas 内容嵌入 SVG）
    document.getElementById('download-svg').addEventListener('click', () => {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${canvas.width}" height="${canvas.height}">
        <rect width="100%" height="100%" fill="${document.getElementById('bg-color').value}"/>
        <image href="${canvas.toDataURL('image/png')}" x="0" y="0" width="${canvas.width}" height="${canvas.height}"/>
      </svg>`;
      const blob = new Blob([svg], {type: 'image/svg+xml;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'qrcode.svg';
      link.click();
      URL.revokeObjectURL(url);
    });

    // 初始化一次
    makeQR();
  </script>
